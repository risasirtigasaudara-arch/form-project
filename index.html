<!DOCTYPE html>
<html>
<head>
  <title>Form Data</title>
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 36px;
      padding: 40px;
    }

    h2 {
      font-size: 20px;
    }

    label {
      font-size: 20px;
    }

    input {
      font-size: 32px;
      padding: 16px 20px;
      width: 520px;
      margin-top: 12px;
    }

    button {
      font-size: 32px;
      padding: 20px 32px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>

</head>
<body>

<h2>Form Input Data</h2>

<form id="form">
  <label>Nama:</label><br>
  <input type="text" name="nama" required><br><br>

  <label>Alamat:</label><br>
  <input type="text" name="alamat" required><br><br>

  <button type="submit">Kirim</button>
</form>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzXGa88gX3lQSXUDrDWTzfwTtP7FdUeoh6FGUxJ0EJItckQtny4AC3eGUR6puG1SQw-BQ/exec";
const form = document.getElementById("form");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      nama: form.nama.value,
      alamat: form.alamat.value
    })
  })
  .then(response => {
    alert("Data berhasil dikirim!");
    form.reset();
  })
  .catch(error => {
    alert("Terjadi error!");
  });
});
</script>

</body>
</html>
